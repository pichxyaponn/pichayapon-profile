server {
    listen 2005;
    server_name localhost;

    # The root directory where Astro's built files are located
    root /usr/share/nginx/html;
    index index.html;

    # Emit RELATIVE Location headers on 3xx redirects. Without this, nginx
    # builds absolute Location URLs using its own $server_port (2005) — so the
    # trailing-slash redirect for /certifications → /certifications/ sent
    # clients to http://pichayapon.com:2005/certifications/, a port neither
    # Cloudflare nor the origin firewall opens. Browser hangs, never loads.
    absolute_redirect off;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml application/xml application/rss+xml;

    # Unknown paths must be a real 404 (status + custom page), not a soft-404
    # serving index.html with 200.
    error_page 404 /404.html;
    location / {
        try_files $uri $uri/ =404;
    }

    # Astro emits content-hashed assets under /_astro/ only — safe to cache
    # forever. Unhashed files (favicon.svg, robots.txt) intentionally get no
    # long-lived cache so they can change in place.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
